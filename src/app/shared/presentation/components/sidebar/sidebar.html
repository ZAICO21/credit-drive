<aside class="sidebar-shell">
  <div>
    <div class="sidebar-brand">
      <img class="sidebar-logo" src="CreditDriveProfilePic.png" alt="CreditDrive" />
      <div>
        <strong class="sidebar-brand-title">{{ 'app.title' | translate }}</strong>
        <span class="sidebar-brand-subtitle">{{ 'app.subtitle' | translate }}</span>
      </div>
    </div>

    <nav class="sidebar-nav" aria-label="principal">
      @for (option of options(); track option.link) {
        <a mat-button class="sidebar-link" [routerLink]="option.link" routerLinkActive="active-link">
          <mat-icon>{{ option.icon }}</mat-icon>
          <span>{{ option.label | translate }}</span>
        </a>
      }
    </nav>
  </div>

  <div class="sidebar-bottom">
    <div class="sidebar-user">
      <img class="sidebar-user-avatar" src="CreditDriveProfilePic.png" alt="" />
      <div>
        <strong>{{ iamStore.currentUser()?.fullName }}</strong>
        <span>{{ iamStore.currentUser()?.roleName }}</span>
      </div>
    </div>

    <a mat-button class="sidebar-link sidebar-link-muted" routerLink="/settings">
      <mat-icon>settings</mat-icon>
      <span>{{ 'sidebar.settings' | translate }}</span>
    </a>

    <button mat-button type="button" class="sidebar-link sidebar-link-muted" (click)="performSignOut()">
      <mat-icon>logout</mat-icon>
      <span>{{ 'sidebar.logout' | translate }}</span>
    </button>
  </div>
</aside>
