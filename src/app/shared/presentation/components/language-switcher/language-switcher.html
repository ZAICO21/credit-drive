<button mat-icon-button class="language-trigger" [matMenuTriggerFor]="menu" aria-label="language">
  <span class="language-code">{{ current().toUpperCase() }}</span>
</button>
<mat-menu #menu="matMenu">
  @for (lang of languages; track lang) {
    <button mat-menu-item (click)="use(lang)" [disabled]="lang === current()">
      {{ ('language.' + lang) | translate }}
    </button>
  }
</mat-menu>
